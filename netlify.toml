[build]
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"

# Scheduled function: één rustig dagoverzicht per makelaar, 's ochtends rond
# 09:00 NL, met zijn eigen openstaande leads in drie groepen (nog niet gebeld /
# opvolgen / afspraak). Vervangt de losse per-lead herinneringsmails.
# Netlify cron draait in UTC: '0 7 * * *' ≈ 09:00 NL zomertijd (08:00 wintertijd).
[functions."dagoverzicht-check"]
  schedule = "0 7 * * *"

# Scheduled function: stuurt de gevende makelaar een push 0-5 min vóór de
# geplande bezichtiging, zodat hij de kaart meteen kan openen en na afloop
# direct feedback kan geven. Draait elke 5 minuten.
[functions."bezichtiging-push-check"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
